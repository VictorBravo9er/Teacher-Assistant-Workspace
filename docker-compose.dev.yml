services:
  backend:
    image: ta-backend-dev
    build:
      target: base
    container_name: ta-backend-dev
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - HOME=/tmp
    command: sh -c "uv sync && /app/.venv/bin/uvicorn main:app --host 0.0.0.0 --port $${BACKEND_PORT} --reload"
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./backend:/app

  frontend:
    image: ta-frontend-dev
    container_name: ta-frontend-dev
    build:
      target: base
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - HOME=/tmp
    command: sh -c "npm i && npm run dev -- --host 0.0.0.0 --port $${PORT}"
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./frontend:/app
