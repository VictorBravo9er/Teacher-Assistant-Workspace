services:
  backend:
    image: ta-backend-dev
    build:
      target: prep
    container_name: ta-backend-dev
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - HOME=/tmp
    command: sh -c "uv sync --frozen && exec /app/.venv/bin/uvicorn main:app --host 0.0.0.0 --port $${BACKEND_PORT} --reload --reload-dir main.py --reload-dir src"
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - /app/.venv
      - ./backend:/app

  frontend:
    image: ta-frontend-dev
    container_name: ta-frontend-dev
    build:
      target: base
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - HOME=/tmp
    command: sh -c "npm i && exec npm run dev -- --host 0.0.0.0 --port $${FRONTEND_PORT}"
    ports:
      - "${HOST_PORT}:${FRONTEND_PORT}"
    volumes:
      - /app/node_modules
      - ./frontend:/app
